<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARS PIT</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0604;
        overflow: hidden;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        color: #f4e4d4;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      /* Boot splash — painted from inline HTML/CSS so it shows INSTANTLY, before
         the (large, WebGPU) JS bundle downloads, parses, and inits the renderer.
         main.ts removes it once the first screen is live. */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: radial-gradient(ellipse at center, #1a0f08 0%, #0a0604 70%);
        transition: opacity 0.45s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .bs-logo {
        font-weight: 900;
        font-size: clamp(2.5rem, 9vw, 5rem);
        letter-spacing: 0.04em;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.7);
      }
      #boot-splash .bs-mars {
        color: #ffd23f;
      }
      #boot-splash .bs-inc {
        color: #f4e4d4;
        margin-left: 0.16em; /* tight gap after MARS (no big word-space) */
      }
      #boot-splash .bs-bar {
        position: relative;
        width: min(280px, 60vw);
        height: 4px;
        background: rgba(244, 228, 212, 0.12);
        border-radius: 3px;
        overflow: hidden;
      }
      #boot-splash .bs-fill {
        position: absolute;
        top: 0;
        left: -45%; /* match the animation's start so it doesn't flash at 0 first */
        height: 100%;
        width: 40%;
        border-radius: 3px;
        background: linear-gradient(90deg, transparent, #ffd23f, transparent);
        animation: bs-slide 1.1s ease-in-out infinite;
      }
      @keyframes bs-slide {
        0% {
          left: -45%;
        }
        100% {
          left: 100%;
        }
      }
      #boot-splash .bs-tag {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        color: rgba(244, 228, 212, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-logo"><span class="bs-mars">MARS</span><span class="bs-inc">INC</span></div>
      <div class="bs-bar"><div class="bs-fill"></div></div>
      <div class="bs-tag">Spinning up the colosseum…</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
