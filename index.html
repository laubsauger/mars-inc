<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARS PIT</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0604;
        overflow: hidden;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        color: #f4e4d4;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      /* Boot splash — painted from inline HTML/CSS so it shows INSTANTLY, before
         the (large, WebGPU) JS bundle downloads, parses, and inits the renderer.
         main.ts removes it once the first screen is live. */
      /* Pin the box model + font on the splash so it doesn't reflow when the app's
         bundled CSS (Tailwind preflight) loads and sets border-box + its own font
         globally. Without this the bordered squares shrink and the layout shifts. */
      #boot-splash,
      #boot-splash *,
      #boot-splash *::before,
      #boot-splash *::after {
        box-sizing: border-box;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        background:
          radial-gradient(ellipse at center, #1a0f08 0%, #0a0604 70%),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 3px,
            rgba(0, 0, 0, 0.22) 3px,
            rgba(0, 0, 0, 0.22) 4px
          );
        transition: opacity 0.45s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      /* Logo lockup — mirrors the main-menu header (src/ui/screens/MainMenu.tsx
         LogoLockup): bracket deco row, framed plate, gold underline, accent triad. */
      #boot-splash .bs-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      #boot-splash .bs-deco {
        width: clamp(240px, 42vw, 352px);
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #boot-splash .bs-deco-side {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #boot-splash .bs-tick {
        height: 1px;
        width: 40px;
      }
      #boot-splash .bs-sq {
        height: 12px;
        width: 12px;
        border: 1px solid;
        background: #070504;
      }
      #boot-splash .bs-cyan {
        color: #32d7ff;
        background-color: #32d7ff;
        box-shadow: 0 0 14px rgba(50, 215, 255, 0.8);
      }
      #boot-splash .bs-sq.bs-cyan {
        background: #070504;
      }
      #boot-splash .bs-elite {
        color: #d84cff;
        background-color: #d84cff;
        box-shadow: 0 0 14px rgba(216, 76, 255, 0.7);
      }
      #boot-splash .bs-sq.bs-elite {
        background: #070504;
      }
      #boot-splash .bs-logo {
        width: fit-content;
        padding: 7px 32px;
        background: rgba(7, 5, 4, 0.88);
        border-bottom: 4px solid #ffd23f;
        box-shadow:
          0 18px 64px rgba(0, 0, 0, 0.72),
          inset 0 0 0 1px rgba(240, 200, 121, 0.16);
        filter: drop-shadow(0 0 18px rgba(196, 106, 43, 0.42));
        font-weight: 900;
        font-size: clamp(40px, 9vw, 80px);
        line-height: 1.05;
        letter-spacing: 0.02em;
      }
      #boot-splash .bs-mars {
        color: #ffd23f;
      }
      #boot-splash .bs-inc {
        color: #f4e4d4;
        margin-left: 0.16em; /* tight gap after MARS (no big word-space) */
      }
      #boot-splash .bs-triad {
        margin-top: 2px;
        width: 160px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #boot-splash .bs-triad > i {
        height: 4px;
        display: block;
      }
      #boot-splash .bs-t1 {
        flex: 1;
        background: #ffd23f;
      }
      #boot-splash .bs-t2 {
        width: 32px;
        background: #32d7ff;
      }
      #boot-splash .bs-t3 {
        flex: 1;
        background: #ff3b30;
      }
      /* Progress zone — separated from the logo lockup, text sits ABOVE the bar. */
      #boot-splash .bs-progress {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        margin-top: 26px;
      }
      #boot-splash .bs-tag {
        min-height: 16px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        color: rgba(244, 228, 212, 0.55);
      }
      #boot-splash .bs-bar {
        position: relative;
        width: min(300px, 64vw);
        height: 14px;
        background: rgba(7, 5, 4, 0.72);
        border: 1px solid rgba(240, 200, 121, 0.16);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }
      /* Determinate fill — width driven by main.ts as real assets load. Picks up the
         main-menu CTA's orange→purple gradient. NOTE: boot hammers the main thread
         (renderer init, audio decode), so ONLY transform/opacity animations stay
         smooth (compositor); background-position / filter animations stall. The
         sheen is therefore pure transform+opacity. */
      #boot-splash .bs-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        border-radius: 8px;
        background: linear-gradient(90deg, #ffc23a 0%, #ff7a1f 50%, #d84cff 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
        transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        overflow: hidden; /* clip the sheen to the FILLED area only */
      }
      #boot-splash .bs-fill::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 55%;
        background: linear-gradient(
          100deg,
          transparent,
          rgba(255, 255, 255, 0.55) 50%,
          transparent
        );
        transform: translateX(-160%) skewX(-16deg);
        animation: bs-sheen 2.6s ease-in-out infinite;
      }
      /* One-direction sweep: glide L→R, then hold off-screen right (clipped) as an
         idle gap before the next pass. Never travels back. */
      @keyframes bs-sheen {
        0% {
          transform: translateX(-160%) skewX(-16deg);
        }
        55% {
          transform: translateX(320%) skewX(-16deg);
        }
        100% {
          transform: translateX(320%) skewX(-16deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-lockup">
        <div class="bs-deco">
          <div class="bs-deco-side">
            <span class="bs-tick bs-cyan"></span>
            <span class="bs-sq bs-cyan"></span>
          </div>
          <div class="bs-deco-side">
            <span class="bs-sq bs-elite"></span>
            <span class="bs-tick bs-elite"></span>
          </div>
        </div>
        <div class="bs-logo"><span class="bs-mars">MARS</span><span class="bs-inc">INC</span></div>
        <div class="bs-triad"><i class="bs-t1"></i><i class="bs-t2"></i><i class="bs-t3"></i></div>
      </div>
      <div class="bs-progress">
        <div class="bs-tag">Spinning up the colosseum…</div>
        <div class="bs-bar"><div class="bs-fill"></div></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
